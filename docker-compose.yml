services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.ala.pet}
        NEXT_PUBLIC_API_MODE: ${NEXT_PUBLIC_API_MODE:-real}
    image: ${ADMIN_IMAGE:-ala-pet-admin:latest}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.ala.pet}
      NEXT_PUBLIC_API_MODE: ${NEXT_PUBLIC_API_MODE:-real}
    ports:
      - "${ADMIN_PORT:-3100}:3000"
